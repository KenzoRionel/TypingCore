<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil - TypingCore</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" href="img/TypingCoreIcon.svg" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="stylesheet" href="css/profile-style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .profile-container {
        max-width: 900px;
        margin: 20px 0 20px 0px;
        padding: 20px;
      }

      /* ---- Keycap Header (Step 1) ---- */

      @keyframes tc-fade-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .tc-fade {
        opacity: 0;
        animation: tc-fade-up 0.5s ease both;
      }

      .tc-card {
        background: var(--tc-card-bg);
        border: 1px solid var(--tc-key-border);
        border-radius: 24px;
        padding: 24px;
      }

      .tc-header-row {
        display: flex;
        align-items: center;
        gap: 24px;
      }

      .tc-avatar {
        --tier-color: var(--tc-tier-rookie);
        position: relative;
        overflow: visible;
        width: 88px;
        height: 88px;
        flex-shrink: 0;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--tc-key-bg);
        border: 1px solid var(--tc-key-border);
        box-shadow:
          0 0 0 2px color-mix(in srgb, var(--tier-color) 45%, transparent),
          inset 0 1px 0 var(--tc-shadow-inset),
          0 4px 0 var(--tc-shadow-edge),
          0 9px 16px var(--tc-shadow-blur);
        font-size: 2rem;
        color: var(--text-secondary);
      }

      .tc-info {
        flex: 1;
        min-width: 0;
      }

      .tc-info-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      .tc-username {
        font-family: "Manrope", sans-serif;
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--text-primary);
        margin: 0;
      }

      /* ---- Nama block: username + level name (kanan nama) ---- */
      .tc-name-block {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .tc-username-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 10px;
      }

      /* Nama level, sekarang di sebelah kanan nama user (baris yang sama) */
      .tc-level-name {
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--tc-amber);
        white-space: nowrap;
      }

      .tc-avatar-badge {
        width: auto;
        height: 82px;
        object-fit: contain;
        opacity: 0;
        transform: scale(0.85);
        transition: opacity 0.2s ease, transform 0.2s ease;
        pointer-events: none;
        margin: -6px 0 -30px;
      }

      .tc-avatar-badge.is-visible {
        opacity: 1;
        transform: scale(1);
      }

      @media (max-width: 640px) {
        .tc-avatar-badge {
          width: 96px;
          height: 96px;
          margin: -4px 0 -22px;
        }
        .tc-name-block {
          align-items: center;
        }
      }

      /* ---- Teks "Level N", dipindah ke ujung kanan, di atas bar XP ---- */
      .tc-level-topright {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 6px;
        cursor: default;
        position: relative;
        width: fit-content;
        margin-left: auto;
        border-radius: 6px;
      }

      .tc-level-topright:focus-visible {
        outline: 2px solid var(--tc-amber);
        outline-offset: 3px;
      }

      .tc-level {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--text-primary);
        white-space: nowrap;
      }

      /* Tooltip kustom untuk teks Level, dipicu via data-tooltip.
         `title` bawaan browser tetap ada sebagai fallback aksesibilitas. */
      .tc-level-topright[data-tooltip]::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: calc(100% + 8px);
        right: 0;
        width: max-content;
        max-width: 240px;
        padding: 8px 12px;
        border-radius: 10px;
        background: var(--tc-key-bg, #222);
        color: var(--text-primary);
        border: 1px solid var(--tc-key-border);
        font-size: 0.78rem;
        font-weight: 500;
        line-height: 1.35;
        white-space: normal;
        box-shadow: 0 8px 20px var(--tc-shadow-blur);
        opacity: 0;
        transform: translateY(4px);
        transition: opacity 0.15s ease, transform 0.15s ease;
        pointer-events: none;
        z-index: 20;
      }

      .tc-level-topright[data-tooltip]:hover::after,
      .tc-level-topright[data-tooltip]:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      /* ---- Title badge (WPM / Akurasi / Total Test), sekarang di dalam
         tiap kartu stat, tepat di bawah angkanya ---- */
      .tc-title-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 10px;
        padding: 3px 12px 3px 10px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.75rem;
        background: var(--tc-key-light-bg);
        border: 1px solid var(--tc-key-border);
        color: var(--text-secondary);
      }

      .tc-title-badge i {
        font-size: 0.8em;
        color: var(--tc-amber);
      }

      .tc-title-badge.is-god {
        border-color: transparent;
        background-image: linear-gradient(90deg, var(--tc-tier-god-start), var(--tc-tier-god-end));
      }

      .tc-title-badge.is-god span,
      .tc-title-badge.is-god i {
        background-image: linear-gradient(90deg, var(--tc-tier-god-start), var(--tc-tier-god-end));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .tc-streak-wrap {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }

      .tc-streak-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 0.95rem;
        background: var(--tc-flame-bg);
        border: 1px solid var(--tc-flame-border);
        color: var(--tc-flame);
      }

      .tc-streak-pill span:nth-child(2) {
        font-family: "JetBrains Mono", monospace;
      }

      .tc-streak-best {
        margin-top: 4px;
        font-size: 0.8rem;
        color: var(--text-light);
      }

      .tc-xp {
        margin-top: 6px;
      }

      .xp-bar {
        width: 100%;
        max-width: none;
        height: 10px;
        background: var(--tc-key-light-bg);
        border-radius: 999px;
        margin: 0;
        overflow: hidden;
      }

      .xp-bar-fill {
        height: 100%;
        width: 0%;
        background: var(--tc-amber);
        border-radius: 999px;
        transition: width 1.1s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .tc-xp-text {
        margin-top: 6px;
        display: flex;
        justify-content: space-between;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        color: var(--text-secondary);
      }

      .tc-stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 16px;
      }

      .tc-keycap {
        position: relative;
        background: var(--tc-key-light-bg);
        border: 1px solid var(--tc-key-border);
        border-radius: 16px;
        padding: 20px 12px;
        text-align: center;
        box-shadow:
          inset 0 1px 0 var(--tc-shadow-inset),
          0 4px 0 var(--tc-shadow-edge),
          0 9px 16px var(--tc-shadow-blur);
        transition: transform 0.12s ease, box-shadow 0.12s ease;
      }

      /* Icon mahkota di pojok kiri atas tiap kartu stat (WPM Terbaik,
         Akurasi Rata-rata, Total Test) */
      .tc-keycap-crown {
        position: absolute;
        top: 10px;
        left: 12px;
        font-size: 0.85rem;
        color: var(--tc-amber);
      }

      .tc-keycap:hover {
        transform: translateY(3px);
        box-shadow:
          inset 0 1px 0 var(--tc-shadow-inset),
          0 1px 0 var(--tc-shadow-edge),
          0 3px 8px var(--tc-shadow-blur);
      }

      .tc-stat-value {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 2rem;
        color: var(--text-primary);
        line-height: 1;
      }

      .tc-stat-label {
        margin-top: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
      }

      @media (max-width: 640px) {
        .tc-header-row {
          flex-direction: column;
          text-align: center;
        }
        .tc-info-top {
          flex-direction: column;
          align-items: center;
        }
        .tc-streak-wrap {
          align-items: center;
        }
        .tc-username-row {
          justify-content: center;
        }
        .tc-level-topright {
          justify-content: center;
          margin-left: 0;
        }
        .tc-level-topright[data-tooltip]::after {
          left: 50%;
          right: auto;
          transform: translate(-50%, 4px);
        }
        .tc-level-topright[data-tooltip]:hover::after,
        .tc-level-topright[data-tooltip]:focus-visible::after {
          transform: translate(-50%, 0);
        }
        .tc-stats-grid {
          gap: 10px;
        }
        .tc-stat-value {
          font-size: 1.5rem;
        }
        .tc-card {
          padding: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .tc-fade {
          animation: none;
          opacity: 1;
        }
        .tc-keycap {
          transition: none;
        }
        .xp-bar-fill {
          transition: none;
        }
      }

      /* ---- Personal Best Cards ---- */
      .pb-section {
        margin-top: 28px;
      }

      .pb-section-title {
        font-family: "Manrope", sans-serif;
        font-size: 1.15rem;
        font-weight: 800;
        color: var(--text-primary);
        margin: 0 0 14px;
      }

      .pb-cards-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      .pb-card {
        background: var(--tc-card-bg);
        border: 1px solid var(--tc-key-border);
        border-radius: 18px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow:
          inset 0 1px 0 var(--tc-shadow-inset),
          0 4px 0 var(--tc-shadow-edge),
          0 9px 16px var(--tc-shadow-blur);
      }

      .pb-card:hover {
        transform: translateY(-4px);
        box-shadow:
          inset 0 1px 0 var(--tc-shadow-inset),
          0 8px 0 var(--tc-shadow-edge),
          0 14px 22px var(--tc-shadow-blur);
      }

      .pb-card-mode {
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--text-secondary);
      }

      .pb-card-wpm {
        font-family: "JetBrains Mono", monospace;
        font-size: 2.1rem;
        font-weight: 700;
        color: var(--text-primary);
        line-height: 1;
        display: flex;
        align-items: baseline;
        gap: 6px;
      }

      .pb-card-wpm-unit {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--text-light);
      }

      .pb-card-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.78rem;
        color: var(--text-secondary);
      }

      .pb-card--empty {
        align-items: flex-start;
        justify-content: center;
        min-height: 112px;
      }

      .pb-card-empty-text {
        font-size: 0.88rem;
        color: var(--text-light);
        margin: 4px 0 10px;
      }

      .pb-card-cta {
        border: 1px solid var(--tc-key-border);
        background: var(--tc-key-light-bg);
        color: var(--tc-amber);
        font-weight: 700;
        font-size: 0.82rem;
        padding: 8px 14px;
        border-radius: 10px;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.15s ease;
      }

      .pb-card-cta:hover {
        transform: translateY(-2px);
        background: var(--tc-flame-bg);
      }

      @media (max-width: 900px) and (min-width: 641px) {
        .pb-cards-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 640px) {
        .pb-cards-grid {
          display: flex;
          overflow-x: auto;
          gap: 12px;
          padding-bottom: 6px;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
        }
        .pb-card {
          min-width: 68%;
          flex: 0 0 auto;
          scroll-snap-align: start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .pb-card,
        .pb-card-cta {
          transition: none;
        }
      }

      .history-section h3 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: #ededed;
      }

      .history-table {
        width: 100%;
        max-width: 600px;
        font-size: 1rem;
      }

      .history-table th,
      .history-table td {
        padding: 14px 0;
        border-bottom: 1px solid #575757;
      }

      .history-table th {
        font-weight: 500;
        color: #666;
      }

      .wpm-high { color: #28a745; }
      .wpm-med { color: #f0ad4e; }
      .wpm-low { color: #dc3545; }

      .empty-state {
        color: #999;
        padding: 30px 0;
      }

      @media (max-width: 768px) {
        .profile-container {
          margin: 30px;
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <main class="main-content">
        <header id="header" class="site-header d-flex align-items-center">
          <nav class="navbar navbar-expand navbar-light flex-grow-1">

        </header>

        <div class="profile-container">
          <div class="tc-card tc-fade">
            <div class="tc-header-row">
              <div class="tc-avatar" id="avatarKey">
                <i class="fas fa-user"></i>
              </div>
              <div class="tc-info">
                <div class="tc-info-top">

                      <h1 class="tc-username" id="username">Guest</h1>
                      <span class="tc-level-name" id="levelNameText">Newbie Typer</span>

                    />

                    id="levelRow"

                    <div class="xp-bar-fill" id="xpBarFill" style="width: 0%"></div>

          <!-- diisi oleh js/history/AchievementGrid.js (React) -->

          <!-- diisi oleh js/history/SkillAnalysis.js (React) -->

          <!-- diisi oleh js/history/AllTimeStats.js (React) -->
          <div id="allTimeStatsRoot" class="tc-fade" style="animation-delay: 480ms"></div>

          <!-- diisi oleh js/history/FunStats.js (React) -->
          <div id="funStatsRoot" class="tc-fade" style="animation-delay: 520ms"></div>

          <div class="history-section">
            <h3>Last 10 Tests</h3>
            <table class="history-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>WPM</th>
                  <th>Acc</th>
                  <th>XP</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                <tr>
                  <td colspan="4" class="empty-state">No history yet</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script src="js/bootstrap/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { getTypingScores } from './js/history/score-manager.js';
      import { buildUserData as buildProfileUserData } from './js/history/profile-stats.js';
      // Rumus format ribuan untuk teks XP, mis. 3400 -> "3,400".
      const xpNumberFormat = new Intl.NumberFormat('en-US');

      // ==================== Profile Header logic (Step 1) ====================
      // Data asli, dibangun dari localStorage (lihat js/history/profile-stats.js):
      //  - level & xp: dihitung dari 'userXP' (kunci yang SAMA dipakai oleh
      //    animateXPBar() di game-logic.js), memakai tabel level yang identik,
      //    supaya Level di sini selalu sinkron dengan yang tampil saat selesai tes.
      //  - streak: dihitung dari tanggal-tanggal di 'typingScores' (hari-hari
      //    berturut-turut yang punya minimal 1 tes).
      //  - stats: agregasi WPM/akurasi/jumlah tes dari 'typingScores'.
      // Username belum punya sistem akun/login di kode yang ada, jadi untuk
      // sementara diambil dari localStorage 'typingUsername' (bisa diisi lewat
      // console: localStorage.setItem('typingUsername', 'NamaKamu')), dengan
      // fallback "Guest" alih-alih nama hardcoded "Dapa".
      function buildUserData() {
        const scores = getTypingScores();
        const username = localStorage.getItem('typingUsername') || 'Guest';
        return buildProfileUserData(scores, username);
      }

      // ==================== Title WPM (Baris "WPM Terbaik") ====================
      // Dipakai juga untuk warna keycap avatar (--tier-color), tetap
      // memakai 4 rentang cssVar lama supaya avatar tidak berubah terlalu
      // drastis, tapi nama title-nya sekarang mengikuti 10 tier di bawah.
      const TIERS = [
        { name: "Novice", min: 0, cssVar: "--tc-tier-rookie" },
        { name: "Novice", min: 30, cssVar: "--tc-tier-rookie" },
        { name: "Casual Typer", min: 50, cssVar: "--tc-tier-speedster" },
        { name: "Intermediate", min: 60, cssVar: "--tc-tier-speedster" },
        { name: "Proficient", min: 80, cssVar: "--tc-tier-demon" },
        { name: "Fast Typer", min: 100, cssVar: "--tc-tier-demon" },
        { name: "Advanced", min: 130, cssVar: null },
        { name: "Expert", min: 160, cssVar: null },
        { name: "Master", min: 200, cssVar: null },
        { name: "Grandmaster", min: 250, cssVar: null },
        { name: "Apex", min: 300, cssVar: null },
      ];

      // ==================== Title Akurasi (Baris "Akurasi Rata-rata") ====================
      const ACCURACY_TIERS = [
        { name: "Inconsistent", min: 0 },
        { name: "Inconsistent", min: 60 },
        { name: "Improving", min: 70 },
        { name: "Accurate", min: 80 },
        { name: "Precise", min: 90 },
        { name: "Flawless", min: 100 },
      ];

      // ==================== Title Total Test (Baris "Total Test") ====================
      const TEST_TIERS = [
        { name: "Starter", min: 0 },
        { name: "Starter", min: 10 },
        { name: "Regular", min: 50 },
        { name: "Dedicated", min: 100 },
        { name: "Committed", min: 300 },
        { name: "Veteran", min: 500 },
        { name: "Seasoned", min: 1000 },
        { name: "Marathon Typer", min: 3000 },
        { name: "Hardcore", min: 5000 },
        { name: "Legend", min: 10000 },
        { name: "Eternal", min: 50000 },
      ];

      function getRankFromTiers(tiers, value) {
        let rank = tiers[0];
        for (const t of tiers) {
          if (value >= t.min) rank = t;
        }
        return rank;
      }

      // ==================== Badge Tier per Level ====================
      // Peta nama level -> gambar badge. Key HARUS persis sama dengan
      // `name` di LEVEL_NAME_RANGES (js/utils/level-system.js), karena
      // `userData.levelName` yang dipakai di renderProfileHeader() datang
      // dari getLevelName() di file itu (lewat profile-stats.js).
      //
      // CATATAN: LEVEL_NAME_RANGES saat ini punya 9 tier, tapi baru 8
      // gambar badge yang disediakan — tier "Keyboard Legend" (level 71-99)
      // belum ada asetnya, jadi untuk sementara di-fallback ke gambar
      // "Manuscript Master" (img/inferno.png) supaya tidak muncul badge
      // kosong/ikon rusak. Ganti baris di bawah begitu asetnya tersedia,
      // misalnya: "Keyboard Legend": "img/diamond.png",
      const LEVEL_BADGE_IMAGES = {
        "Newbie Typer": "img/level1_rookie.png",
        "Key Toucher": "img/level2_iron.png",
        "Word Crafter": "img/level3_bronze.png",
        "Sentence Slinger": "img/level4_silver.png",
        "Paragraph Pro": "img/level5_gold.png",
        "Essay Elite": "img/level6_emerald.png",
        "Manuscript Master": "img/level7_diamond.png",
        "Keyboard Legend": "img/level8_ruby_god.png",
        "Typing God": "img/level9_mythic_prismatic.png",
      };

      function updateAvatarBadge(levelName) {
        const badge = document.getElementById("avatarLevelBadge");
        const src = LEVEL_BADGE_IMAGES[levelName];

        if (!src) {
          // Nama level tidak ada di peta (mis. tier baru ditambah di
          // level-system.js tapi belum dipetakan di sini) -> sembunyikan
          // badge daripada nampilin ikon rusak.
          badge.classList.remove("is-visible");
          badge.removeAttribute("src");
          return;
        }

        badge.alt = `Badge tier: ${levelName}`;
        badge.onerror = () => badge.classList.remove("is-visible");
        badge.onload = () => badge.classList.add("is-visible");
        badge.src = src;
      }

      function getTier(wpm) {
        let tier = TIERS[0];
        for (const t of TIERS) {
          if (wpm >= t.min) tier = t;
        }
        return tier;
      }

      /** true kalau `rank` adalah tier PALING TINGGI di `tiers` (dipakai buat efek "is-god"). */
      function isMaxRank(tiers, rank) {
        return rank.name === tiers[tiers.length - 1].name;
      }

      // Count-up sederhana, menghormati prefers-reduced-motion
      function animateCount(el, target, { suffix = "", duration = 1300 } = {}) {
        const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (reduced) {
          el.textContent = `${target}${suffix}`;
          return;
        }
        let start = null;
        function step(ts) {
          if (start === null) start = ts;
          const progress = Math.min((ts - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = `${Math.round(target * eased)}${suffix}`;
          if (progress < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function renderProfileHeader(userData) {
        // Title WPM/Akurasi/Total Test — TERPISAH dari Level (dari total
        // XP/grind). Status-status ini sengaja tidak digabung dengan Level.
        const wpmRank = getTier(userData.stats.bestWpm);
        const accRank = getRankFromTiers(ACCURACY_TIERS, userData.stats.avgAcc);
        const testsRank = getRankFromTiers(TEST_TIERS, userData.stats.totalTests);

        document.getElementById("username").textContent = userData.username;

        // ---- Nama level, di sebelah kanan nama user ----
        document.getElementById("levelNameText").textContent = userData.levelName;

        // ---- Teks "Level {level}", di ujung kanan atas bar XP ----
        document.getElementById("levelText").textContent = `Level ${userData.level}`;

        // ---- Badge tier besar, tepat di bawah nama user, sinkron dgn levelName ----
        updateAvatarBadge(userData.levelName);

        // ---- Title WPM Terbaik, di bawah angka WPM Terbaik ----
        document.getElementById("tierTextWpm").textContent = wpmRank.name;
        document
          .getElementById("titleBadgeWpm")
          .classList.toggle("is-god", isMaxRank(TIERS, wpmRank));

        // ---- Title Akurasi Rata-rata, di bawah angka Akurasi Rata-rata ----
        document.getElementById("tierTextAcc").textContent = accRank.name;
        document
          .getElementById("titleBadgeAcc")
          .classList.toggle("is-god", isMaxRank(ACCURACY_TIERS, accRank));

        // ---- Title Total Test, di bawah angka Total Test ----
        document.getElementById("tierTextTests").textContent = testsRank.name;
        document
          .getElementById("titleBadgeTests")
          .classList.toggle("is-god", isMaxRank(TEST_TIERS, testsRank));

        const avatar = document.getElementById("avatarKey");
        avatar.style.setProperty(
          "--tier-color",
          wpmRank.cssVar ? `var(${wpmRank.cssVar})` : "var(--tc-tier-god-start)"
        );

        document.getElementById("streakBest").textContent = `Rekor: ${userData.streak.best} hari`;
        animateCount(document.getElementById("streakCount"), userData.streak.current);

        const isMaxLevel = userData.xpToNext === 0;
        const xpPercent = isMaxLevel
          ? 100
          : Math.min(100, Math.round((userData.xp / userData.xpToNext) * 100));
        const xpRemaining = isMaxLevel ? 0 : Math.max(0, userData.xpToNext - userData.xp);
        document.getElementById("xpText").textContent = isMaxLevel
          ? `${xpNumberFormat.format(userData.xp)} XP (Max Level)`
          : `${xpNumberFormat.format(userData.xp)} / ${xpNumberFormat.format(userData.xpToNext)} XP`;
        document.getElementById("xpRemainingText").textContent = isMaxLevel
          ? ""
          : `${xpNumberFormat.format(xpRemaining)} XP menuju Level ${userData.level + 1}`;

        requestAnimationFrame(() => {
          document.getElementById("xpBarFill").style.width = `${xpPercent}%`;
        });

        animateCount(document.getElementById("statWpm"), userData.stats.bestWpm);
        animateCount(document.getElementById("statAcc"), userData.stats.avgAcc, { suffix: "%" });
        animateCount(document.getElementById("statTests"), userData.stats.totalTests);
      }
      // ==================== end Profile Header logic ====================

      function loadHistory() {
        const scores = getTypingScores();
        const tbody = document.getElementById('historyTableBody');
        
        if (scores.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No history yet</td></tr>';
          return;
        }

        const last10 = scores.slice(-10).reverse();
        
        tbody.innerHTML = last10.map(score => {
          const date = new Date(score.date).toLocaleDateString('id-ID', {
            day: 'numeric', month: 'short'
          });
          
          const accuracyDecimal = score.accuracy / 100;
          const timeMinutes = score.time / 60;
          const earnedXP = Math.round(score.wpm * accuracyDecimal * timeMinutes);
          
          let wpmClass = 'wpm-low';
          if (score.wpm >= 80) wpmClass = 'wpm-high';
          else if (score.wpm >= 50) wpmClass = 'wpm-med';
          
          return `
            <tr>
              <td>${date}</td>
              <td class="${wpmClass}">${score.wpm}</td>
              <td>${score.accuracy}%</td>
              <td>+${earnedXP}</td>
            </tr>
          `;
        }).join('');
      }

      // Init profile features setelah DOM ready
      document.addEventListener('DOMContentLoaded', () => {
        renderProfileHeader(buildUserData());
        loadHistory();

        import('./js/history/pb-manager.js').then(({ renderPBCards }) => {
          renderPBCards(getTypingScores());
        });
      });

      // Dark mode integration
      import('./js/utils/dark-mode.js').then(darkMode => {
        darkMode.initDarkMode(document.getElementById('darkModeToggle'));
      });
    </script>

    <!-- ==================== Grafik Progress (React + Recharts) ====================
         Proyek ini tidak memakai bundler/npm, jadi React, ReactDOM, dan Recharts
         dimuat sebagai modul ES langsung dari CDN (esm.sh). ProgressCharts.js
         ditulis tanpa sintaks JSX (pakai React.createElement) supaya bisa
         dijalankan langsung oleh browser tanpa proses build/Babel. -->
    <script type="module">
      import React from 'https://esm.sh/react@18.3.1';
      import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
      import ProgressCharts from './js/history/ProgressCharts.js';
      import AchievementGrid from './js/history/AchievementGrid.js';
      import SkillAnalysis from './js/history/SkillAnalysis.js';
      import AllTimeStats from './js/history/AllTimeStats.js';
      import FunStats from './js/history/FunStats.js';
      import { getTypingScores } from './js/history/score-manager.js';

      document.addEventListener('DOMContentLoaded', () => {
        const scores = getTypingScores();

        const progressRootEl = document.getElementById('progressChartsRoot');
        if (progressRootEl) {
          createRoot(progressRootEl).render(React.createElement(ProgressCharts, { scores }));
        }

        // ==================== Achievement & Goals ====================
        // Grid 9 badge + kotak "Next Goal" (WPM) + "Milestone Terdekat"
        // (total kata). Logic murni ada di js/history/achievement-logic.js,
        // dihitung dari skor ASLI (typingScores) — bukan data dummy.
        const achievementRootEl = document.getElementById('achievementGridRoot');
        if (achievementRootEl) {
          createRoot(achievementRootEl).render(React.createElement(AchievementGrid, { scores }));
        }

        // ==================== Analisis Skill ====================
        // Keyboard heatmap error-rate per huruf + kalimat kekuatan/
        // kelemahan/saran. Logic murni ada di
        // js/history/skill-analysis-logic.js, dihitung dari
        // `replayData.keystrokes` tiap skor (lihat catatan keterbatasan
        // data di file tsb — hanya skor yang masih menyimpan replay yang
        // ikut dihitung).
        const skillAnalysisRootEl = document.getElementById('skillAnalysisRoot');
        if (skillAnalysisRootEl) {
          createRoot(skillAnalysisRootEl).render(React.createElement(SkillAnalysis, { scores }));
        }

        // ==================== All-Time Stats ====================
        // Grid 2x3 ringkasan seumur hidup. Logic murni ada di
        // js/history/all-time-stats-logic.js.
        const allTimeStatsRootEl = document.getElementById('allTimeStatsRoot');
        if (allTimeStatsRootEl) {
          createRoot(allTimeStatsRootEl).render(React.createElement(AllTimeStats, { scores }));
        }

        // ==================== Fun Stats ====================
        // 3 kotak fakta ringan. Logic murni ada di
        // js/history/fun-stats-logic.js.
        const funStatsRootEl = document.getElementById('funStatsRoot');
        if (funStatsRootEl) {
          createRoot(funStatsRootEl).render(React.createElement(FunStats, { scores }));
        }
      });
    </script>
  </body>
</html>
